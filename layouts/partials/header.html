<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ "/" | relURL }}">Endy Muhardin</a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"{{ if .Page }}{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
