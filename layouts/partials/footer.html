<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-links">
      <a href="mailto:{{ .Site.Params.email }}">Email</a>
      {{ with .Site.Params.social.github }}<a href="{{ . }}" rel="me">GitHub</a>{{ end }}
      {{ with .Site.Params.social.gitlab }}<a href="{{ . }}" rel="me">GitLab</a>{{ end }}
      {{ with .Site.Params.social.linkedin }}<a href="{{ . }}" rel="me">LinkedIn</a>{{ end }}
      {{ with .Site.Params.social.youtube }}<a href="{{ . }}" rel="me">YouTube</a>{{ end }}
    </div>
    <p class="copyright">© {{ now.Year }} Endy Muhardin</p>
  </div>
</footer>
