<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{ $title := .Title }}
  {{ if .IsHome }}{{ $title = .Site.Title }}{{ else }}{{ $title = printf "%s — %s" .Title .Site.Title }}{{ end }}
  <title>{{ $title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="author" content="{{ .Site.Title }}">
  <meta property="og:title" content="{{ $title }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:image" content="{{ .Site.Params.profileImage | absURL }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0a0a0b" media="(prefers-color-scheme: dark)">
  <link rel="preload" href="{{ "fonts/ebgaramond-regular.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
